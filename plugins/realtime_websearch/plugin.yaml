name: realtime_websearch
version: 1.0.0

route_description: >
  This is for any other real time information that is not news or weather.
  This route uses OpenAI web search to answer. If the user asks for a recipe
  or something that is not real time, this is not the route. For example:
  "What is the price of Bitcoin today?" If this is the right route add to
  the json a key "query" with a string that is going to be used to query the
  question in the internet. For example, if the user asked what is the price
  of Bitcoin today, the query is going to be "Bitcoin price today".

route_extra_keys:
  - query

config_defaults:
  search_sources: "4"
